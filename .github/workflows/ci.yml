name: Android CI with Gradle
on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Compile library and sample
        run: ./gradlew :opensrp-chw-mother-mentor:compileDebugJavaWithJavac :sample:compileDebugJavaWithJavac --stacktrace
        env:
          GITHUB_TOKEN: ${{ github.token }}
#      - name: Upload coverage to Coveralls with Gradle
#        run: ./gradlew coveralls --stacktrace
#        env:
#          COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_TOKEN }}
