---
name: step1_population_type
description: population_type
priority: 1
condition: "step1_mobilization_area != null && !step1_mobilization_area.isEmpty()"
actions:
  - "calculation = step1_mobilization_area.equalsIgnoreCase('addo_pharmacy') ? 'ADDO Customers' : step1_mobilization_area.equalsIgnoreCase('traditional_healer') ? 'Traditional Healer Customers' : step1_mobilization_area.equalsIgnoreCase('mines') ? 'Miners' : step1_mobilization_area.equalsIgnoreCase('public_meeting') ? 'Public Meeting Attendees' : step1_mobilization_area.equalsIgnoreCase('prisons') ? 'Prisoners' : step1_mobilization_area.equalsIgnoreCase('church_mosque') ? 'Church/Mosques Attendees' : step1_mobilization_area.equalsIgnoreCase('schools_college') ? 'Scholar/Colleagues' : step1_mobilization_area.equalsIgnoreCase('market') ? 'Market Attendees' : step1_mobilization_area.equalsIgnoreCase('drug_house') ? 'PWUD' : step1_mobilization_area.equalsIgnoreCase('elderly_camp') ? 'Elder' : step1_mobilization_area.equalsIgnoreCase('ovc') ? 'Orphan' : step1_mobilization_area.equalsIgnoreCase('nomadic_population') ? 'Pastoralist' : step1_mobilization_area.equalsIgnoreCase('health_facility') ? 'Health Care Workers' : step1_mobilization_area.equalsIgnoreCase('refugee_camp') ? 'Refugee' : step1_mobilization_area.equalsIgnoreCase('fishing_communities') ? 'Fisherfolks' : step1_mobilization_area.equalsIgnoreCase('local_clubs_breweries') ? 'Local Clubs and Breweries Attendees' : step1_mobilization_area.equalsIgnoreCase('house_to_house') ? 'House Dwellers' : step1_mobilization_area.equalsIgnoreCase('other') ? 'Other' : ''"
